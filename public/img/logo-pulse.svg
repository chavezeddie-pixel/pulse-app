<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a53a"/>
      <stop offset="100%" style="stop-color:#e8634a"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e30"/>
      <stop offset="100%" style="stop-color:#12121f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)"/>
  <!-- Subtle inner shadow -->
  <rect width="512" height="512" rx="110" ry="110" fill="none" stroke="rgba(244,132,95,0.08)" stroke-width="2"/>
  <!-- P letter -->
  <text x="220" y="340" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif" font-weight="800" font-size="320" fill="url(#pGrad)" filter="url(#glow)" letter-spacing="-10">P</text>
  <!-- Heartbeat/pulse line across the P -->
  <polyline points="80,280 160,280 190,280 210,220 230,340 250,240 270,300 290,260 310,280 350,280 380,280 400,220 420,340 440,280 480,280"
    fill="none" stroke="url(#pGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" opacity="0.9"/>
</svg>
