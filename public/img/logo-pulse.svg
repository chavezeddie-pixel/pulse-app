<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="45%" stop-color="#f4945f"/>
      <stop offset="100%" stop-color="#e05a38"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d18"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="30%" stop-color="#f4945f"/>
      <stop offset="70%" stop-color="#f4945f"/>
      <stop offset="100%" stop-color="#e05a38" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Subtle top-left light -->
  <ellipse cx="180" cy="180" rx="180" ry="160" fill="rgba(244,148,95,0.03)"/>

  <!-- P letter — clean geometric shape -->
  <g filter="url(#bigGlow)">
    <path d="
      M 168,100
      L 168,412
      L 218,412
      L 218,305
      L 290,305
      C 385,305 385,100 290,100
      Z
      M 218,150
      L 282,150
      C 342,150 342,255 282,255
      L 218,255
      Z
    " fill="url(#pGrad)" fill-rule="evenodd"/>
  </g>

  <!-- ECG pulse line — single clean heartbeat through middle of P -->
  <g filter="url(#glow)">
    <polyline
      points="
        42,270
        142,270
        168,270
        192,270
        212,215
        235,340
        258,195
        278,285
        292,258
        308,270
        340,270
        380,270
        462,270
      "
      fill="none"
      stroke="url(#pulseGrad)"
      stroke-width="6.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
